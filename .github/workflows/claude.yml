name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Project Setup
        run:
          npm run setup
          npm run dev:daemon

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          custom_instructions: |
            The project is already set up with all dependencies installed.
            The server is already running at localhost:3000. Logs from it
            are begin written to log.txt. If needed, you can query the db
            with the 'sqlite3' cli. If needed, use the mcp__playwright set
            of tools to launch a browser and interact with the app.
            
          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": [
                    "@playwright/mcp:latest",
                    "--allowed-origins",
                    "localhost:3000;cdn.tailwindcss.com;esm.sh"
                  ]
                }
              }
            }

        allowed_tools: "Bash(npx vitest:*),Bash(npm audit:*),Bash(npm ls:*),Bash(npm install:*),Bash(npm show:*),Bash(node -e \"const v=require\\(''''fs''''\\).readFileSync\\(''''/dev/stdin'''',''''utf8''''\\); const versions=JSON.parse\\(v\\); const v5=versions.filter\\(x=>x.startsWith\\(''''5.''''\\)\\); console.log\\(''''v5 versions:'''', v5.slice\\(-10\\)\\); const v6=versions.filter\\(x=>x.startsWith\\(''''6.''''\\)\\); console.log\\(''''v6 versions:'''', v6.slice\\(-5\\)\\);\"),Bash(npm run:*),Bash(grep:*),Bash(npm list:*),Bash(node:*),Bash(npm info:*),Bash(npx tsc:*),Bash(find node_modules -path \"*/ai-sdk/provider-utils/package.json\" -exec cat {}),Bash(xargs ls:*),mcp__playwright,mcp__playwright__browser_navigate,mcp__playwright__browser_console_messages"